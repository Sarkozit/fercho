<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestor de Reservas - Caballo Loco</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Patrick+Hand&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <form id="reservaForm">
      <div class="triple-inline-fields">
        <div>
          <label for="fecha">Fecha:</label>
          <input type="date" id="fecha" name="fecha" required>
        </div>
        <div>
          <label for="hora">Hora:</label>
          <select id="hora" name="hora" required>
            <option value="09:00">09:00</option>
            <option value="10:00">10:00</option>
            <option value="11:00">11:00</option>
            <option value="12:00">12:00</option>
            <option value="13:00">13:00</option>
            <option value="14:00" selected>14:00</option>
            <option value="15:00">15:00</option>
            <option value="16:00">16:00</option>
            <option value="17:00">17:00</option>
          </select>
        </div>
        <div>
          <label for="tour">Tour:</label>
          <select id="tour" name="tour" required>
            <option value="1">1h</option>
            <option value="2" selected>2h</option>
            <option value="4">4h</option>
          </select>
        </div>
      </div>

      <label for="cliente">Cliente:</label>
      <input type="text" id="cliente" name="cliente" required placeholder="Nombre y Apellido">

      <div class="inline-fields">
        <div>
          <label for="telefono">Teléfono:</label>
          <input type="tel" id="telefono" name="telefono" required inputmode="numeric" placeholder="Ej: 3001234567">
        </div>
        <div>
          <label for="caballos">Caballos:</label>
          <input type="text" id="caballos" name="caballos" required pattern="[0-9]*" inputmode="numeric" min="1" placeholder="Cant.">
        </div>
      </div>

      <div class="inline-fields">
        <div>
          <label for="valor">Valor (Adelanto):</label>
          <input type="text" id="valor" name="valor" required pattern="[0-9]*" inputmode="numeric" placeholder="$">
        </div>
        <div>
          <label for="adicionales">Adicionales ($):</label>
          <input type="text" id="adicionales" name="adicionales" pattern="[0-9]*" inputmode="numeric" placeholder="$0">
        </div>
      </div>

      <hr style="margin: 20px 0; border: 1px solid #f0f0f0;">

      <div class="inline-fields">
        <div>
          <label for="asados">Asados:</label>
          <input type="text" id="asados" name="asados" pattern="[0-9]*" inputmode="numeric" placeholder="0">
        </div>
        <div>
          <label for="licor">Licor:</label>
          <input type="text" id="licor" name="licor" pattern="[0-9]*" inputmode="numeric" placeholder="0">
        </div>
      </div>
      <div class="inline-fields">
        <div>
          <label for="kits">Kits:</label>
          <input type="text" id="kits" name="kits" pattern="[0-9]*" inputmode="numeric" placeholder="0">
        </div>
        <div>
          <label for="transporte">Transporte:</label>
          <input type="text" id="transporte" name="transporte" pattern="[0-9]*" inputmode="numeric" placeholder="0">
        </div>
      </div>

      <button type="submit" id="submitButton">ENVIAR RESERVA</button>
    </form>
    
    <div id="success-view" style="display:none;">
      <h2>✅ ¡Procesando!</h2>
      <p>Esperando respuesta...</p>
      <button id="comboButton">Abrir Chat Manualmente</button>
      <div id="copy-feedback" class="copy-feedback"></div>
      <button onclick="location.reload()" style="margin-top:15px; background:#666;">Nueva Reserva</button>
    </div>
  </div>

  <div id="loaderOverlay">
    <div id="loaderBox">
      <div id="progressContainer"><div id="progressBar">0%</div></div>
      <p id="loaderText">Conectando con la fonda...</p>
    </div>
  </div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  
  // --- 1. CONFIGURACIÓN DE URLS ---
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwLL6RAIFLfWpbSY00bwFAuvfNRU-kRHbAwVJnDKr1PDaSgKfi_KrKLlraa9eHOYXXJ/exec'; 
  const N8N_WEBHOOK_URL = 'https://n8n.caballoloco.co/webhook/confirmacion-reservas';

  // --- 2. ELEMENTOS DOM ---
  const form = document.getElementById('reservaForm');
  const successView = document.getElementById('success-view');
  const comboButton = document.getElementById('comboButton');
  const copyFeedback = document.getElementById('copy-feedback');
  const submitButton = document.getElementById('submitButton');
  const loaderOverlay = document.getElementById('loaderOverlay');
  const progressBar = document.getElementById('progressBar');
  const loaderText = document.getElementById('loaderText');

  const today = new Date().toISOString().split('T')[0];
  document.getElementById('fecha').setAttribute('min', today);

  // --- 3. LÓGICA DE ENVÍO ---
  form.addEventListener('submit', function(event) {
    event.preventDefault();

    // Bloquear UI
    submitButton.disabled = true;
    submitButton.textContent = 'Procesando...';
    loaderOverlay.style.display = 'flex';
    progressBar.style.width = '10%';
    loaderText.textContent = 'Guardando en Google Sheets...';

    // Barra de progreso
    let progress = 10;
    const progressInterval = setInterval(function() {
      if (progress < 90) {
        progress += 5;
        progressBar.style.width = progress + '%';
        progressBar.textContent = progress + '%';
      }
    }, 200);

    // Preparar datos crudos
    const formData = new FormData(form);
    const data = {};
    formData.forEach((value, key) => { data[key] = value; });

    // ============================================================
    // 🛠️ CORRECCIÓN: LIMPIEZA DE TELÉFONO PARA N8N
    // ============================================================
    // 1. Quitar todo lo que no sea números (espacios, guiones, +)
    let telefonoRaw = data.telefono.replace(/\D/g, ''); 
    
    // 2. Lógica Colombia: Si son 10 dígitos, agregar 57
    if (telefonoRaw.length === 10) {
        telefonoRaw = '57' + telefonoRaw;
    }
    // (Si ya tiene 12 dígitos y empieza por 57, o es internacional, se queda igual)
    
    // Guardamos el número limpio para usarlo en el payload
    const telefonoFinal = telefonoRaw;
    // ============================================================

    // PASO 1: GUARDAR EN GOOGLE SHEETS
    fetch(WEB_APP_URL, {
      method: 'POST',
      mode: 'cors',
      body: JSON.stringify(data) // A Google le mandamos el dato original, él lo procesa a su manera
    })
    .then(response => response.json())
    .then(result => {
      
      if (result.status === 'success') {
        loaderText.textContent = 'Enviando WhatsApp automático...';
        progressBar.style.width = '95%';

        // Payload para N8N (Usando el teléfono corregido)
        const n8nPayload = {
          phone: telefonoFinal, // <--- AQUÍ VA EL NÚMERO CON 57
          message: result.confirmationText, 
          name: data.cliente,
          source: 'Formulario_Manual_HTML'
        };

        console.log("Enviando a N8N número:", telefonoFinal); // Para depurar en consola

        // PASO 2: ENVIAR A N8N
        fetch(N8N_WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(n8nPayload)
        })
        .then(n8nResp => {
            if (n8nResp.ok) {
                console.log("✅ N8N enviado correctamente.");
                
                // PASO 3: EL DOBLE TOQUE (PINTAR AMARILLO)
                fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'cors',
                    body: JSON.stringify({
                        action: 'confirmar_color',
                        row: result.row
                    })
                })
                .then(() => console.log("✅ Celda pintada de amarillo."))
                .catch(e => console.error("Error pintando:", e));

                finalizarProceso(result, true); 
            } else {
                console.warn("N8N respondió con error:", n8nResp.status);
                finalizarProceso(result, false); 
            }
        })
        .catch(err => {
            console.error("Error de conexión con N8N:", err);
            finalizarProceso(result, false); 
        });

      } else {
        throw new Error(result.message || 'Error desconocido en script');
      }
    })
    .catch(error => {
      clearInterval(progressInterval);
      loaderOverlay.style.display = 'none';
      alert('Error: ' + error.message);
      submitButton.disabled = false;
      submitButton.textContent = 'ENVIAR RESERVA';
    });

    function finalizarProceso(result, enviadoAuto) {
      clearInterval(progressInterval);
      progressBar.style.width = '100%';
      progressBar.textContent = '100%';
      
      setTimeout(() => {
        loaderOverlay.style.display = 'none';
        form.style.display = 'none';
        successView.style.display = 'flex';

        const titulo = successView.querySelector('h2');
        const parrafo = successView.querySelector('p');
        
        if (enviadoAuto) {
          titulo.innerText = "✅ ¡Guardado y Enviado!";
          parrafo.innerText = "La reserva se guardó y el mensaje salió por WhatsApp.";
          comboButton.innerText = "Abrir Chat (Opcional)";
        } else {
          titulo.innerText = "⚠️ Guardado (Envío Manual)";
          parrafo.innerText = "Se guardó, pero falló el envío automático. Revisa el número.";
          comboButton.innerText = "Enviar Manualmente";
        }

        comboButton.onclick = function() {
          if (!result.whatsappNumber || !result.confirmationText) {
             alert("Error: Faltan datos."); return;
          }
          // Usamos el número que nos devolvió Google (que ya tiene lógica similar)
          const whatsappUrl = `https://wa.me/${result.whatsappNumber}`;
          window.open(whatsappUrl, '_blank');
          
          navigator.clipboard.writeText(result.confirmationText).then(() => {
            copyFeedback.textContent = '¡Texto copiado!';
            setTimeout(() => { copyFeedback.textContent = ''; }, 2000);
          }, () => {});
        };
      }, 500);
    }
  });
});
</script>
</body>
</html>
